<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Checkbox Example 4</title>
    <script>
      function lights() {
             //need code here
             let isChecked = document.querySelector("#lightChkBox").checked;
             let formText = document.querySelector("form");
             if (isChecked == true) {
              document.body.style.backgroundColor = "black";
              formText.style.color = "white";
             } else {
              document.body.style.backgroundColor = "white";
              formText.style.color = "black";
             }
       }      
    </script>
  </head>
  <body>
    <form>
      Light Switch: <input type="checkbox" id="lightChkBox" onClick="lights()" name="" value="">
    </form>
  </body>
</html>
