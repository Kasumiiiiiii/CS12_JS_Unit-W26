<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>T8A - Colour Picker</title>
  </head>

  <body>
    <!-- Text -->
    <label for = "colorPicker">Choose a color</label>
    <!-- Input Box -->
    <input type = "text" class = "color" name = "color" value = "blue">
    <!-- Button -->
    <button class = "pick" onClick = "changeColor()"> Change Color</button>


    <script>
      //function goes here
      function changeColor() {
        let useColor = document.querySelector(".color").value;
        document.body.style.backgroundColor = useColor;
      }
    </script>
  </body>
</html>
