<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <link href="style.css" rel="stylesheet" type="text/css" />

    <title>JS5 - Pizza Palace</title>
  </head>

  <body>
    <div class="wrapper">
      <h1 class="heading">Raider Pizza Palace</h1>
      <div class="grid">
        <div class="menu">
          <h3>Menu</h3>
          <p>$10 Small</p>
          <p>$12 Medium</p>
          <p>$14 Large</p>
          <p>$1.50 / Topping</p>
          <img
            class="pizzaImg"
            src="pizza.jpg"
            height="80px"
            alt="pic of pizza"
          />
        </div>
        <div class="right">
          <h3>Order Here:</h3>
          <form class="orderform" name="orderform">
            <div class="field">
              Name: <input type="text" class="name" name="" value="" />
            </div>

            <div class="field">
              # of Pizzas:
              <!--number input -->
              <input type="number" class="pizzaCount" value="" />
            </div>
            <div class="field">
              Size:
              <!--three radio buttons-->
              <input
                type="radio"
                name="size"
                value="small"
                onClick="changeSize()"
              />
              Small
              <input
                type="radio"
                name="size"
                value="medium"
                onClick="changeSize()"
              />
              Medium
              <input
                type="radio"
                name="size"
                value="large"
                onClick="changeSize()"
              />
              Large
            </div>
            <hr />

            <h4>Toppings</h4>
            <!-- add a topping here -->
            <input type="checkbox" class="topping" /> Cheese <br />
            <!-- add a topping here -->
            <input type="checkbox" class="topping" /> Pepperoni <br />
            <!-- add a topping here -->
            <input type="checkbox" class="topping" /> Onions <br />
            <!-- add a topping here -->
            <input type="checkbox" class="topping" /> Bacon <br />
            <!-- add a topping here -->
            <input type="checkbox" class="topping" /> Spinach <br />

            <br />
            <hr />
            <div style="margin: 0 auto">
              <!--add order button here -->
              <button type="button" onClick="orderTotal()">Order Total</button>
              <!--add reset button here -->
              <button type="button" onClick="resetOrder()">Reset</button>
            </div>
          </form>
        </div>
      </div>
      <div class="details">
        <h3 style="margin: 0 auto">Your Order Details</h3>
        <div class="details-field">
          Subtotal
          <input type="text" class="subtotal" name="" value="0" readonly />
        </div>
        <div class="details-field">
          Tax: <input type="text" class="tax" name="" value="0" readonly />
        </div>
        <div class="details-field">
          Total: <input type="text" class="total" name="" value="0" readonly />
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
