<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>T6B - Events - Three Images</title>
  </head>

  <body>
    <p>
      Choose three images and put them on your webpage. When you hover over each
      image, the background color of the page should change.
    </p>
    <h1>
      <!-- Added quotes around colors and used style.backgroundColor -->
      <img src="asterum.webp"  onmouseover="document.body.style.backgroundColor = 'lightblue';" onmouseout="document.body.style.backgroundColor = 'white';">
      <img src="chroma_drift.jpg"  onmouseover="document.body.style.backgroundColor = 'purple';" onmouseout="document.body.style.backgroundColor = 'white';">
      <img src="plaveBanner.jpg"  onmouseover="document.body.style.backgroundColor = 'green';" onmouseout="document.body.style.backgroundColor = 'white';">
  </h1>

  </body>
</html>
